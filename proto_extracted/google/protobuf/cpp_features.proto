syntax = "proto2";

package pb;

import "google/protobuf/descriptor.proto";

message CppFeatures {
    optional bool legacy_closed_enum = 1 [retention = RETENTION_RUNTIME, targets = [TARGET_TYPE_FIELD, TARGET_TYPE_FILE], edition_defaults = [value: "false"
    ]];
}

extend google.protobuf.FeatureSet {
    optional CppFeatures cpp = 1000;
}
