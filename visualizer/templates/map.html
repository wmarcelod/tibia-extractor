{% extends "base.html" %}
{% block title %}Mapa - Tibia DB{% endblock %}

{% block main %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<main class="single">
  <section class="content">
    <h2>Mapa <small>(1211 NPCs, {{ areas|length }} areas)</small></h2>

    <div class="map-toolbar">
      <label>Piso:
        <select id="floor-select">
          {% for z in range(8) %}
            <option value="{{ z }}" {% if z == 7 %}selected{% endif %}>z={{ z }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Camada:
        <select id="layer-select">
          <option value="auto" selected>Satélite (auto-zoom)</option>
          <option value="satellite_64">Satélite alta-res</option>
          <option value="satellite_32">Satélite média-res</option>
          <option value="satellite_16">Satélite baixa-res</option>
          <option value="minimap_64">Minimapa alta-res</option>
          <option value="minimap_32">Minimapa baixa-res</option>
        </select>
      </label>
      <label><input type="checkbox" id="show-npcs" checked> Mostrar NPCs</label>
      <span id="npc-count" class="tag">0 NPCs</span>
    </div>

    <div id="map" style="width:100%; height:700px; background:#111; border:1px solid var(--border-soft); border-radius:4px;"></div>

    <p style="margin-top:10px; color: var(--fg-muted); font-size: 12px;">
      Dados extraidos direto de <code>assets/assets/map-*.dat</code> + tiles de
      <code>satellite-*.bmp.lzma</code>/<code>minimap-*.bmp.lzma</code> do cliente.
    </p>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  // Leaflet CRS.Simple: lat = -y (pra norte ficar pra cima), lng = x
  function latLng(x, y) { return [-y, x]; }

  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3, maxZoom: 4, zoom: 0,
    attributionControl: false,
    zoomSnap: 0.5, zoomDelta: 0.5,
  });

  let currentLayers = [];
  let npcMarkers = [];
  let currentZ = 7;
  let currentKind = 'auto';
  let fitOnNextLoad = true;

  // Auto-zoom: baseia escolha da kind no zoom atual do Leaflet
  function autoKind(prefix) {
    const z = map.getZoom();
    // prefix = 'satellite' ou 'minimap'
    if (prefix === 'minimap') return z >= 1 ? 'minimap_64' : 'minimap_32';
    if (z >= 2) return 'satellite_64';
    if (z >= 0) return 'satellite_32';
    return 'satellite_16';
  }

  function resolveKind() {
    if (currentKind === 'auto') return autoKind('satellite');
    if (currentKind === 'minimap_auto') return autoKind('minimap');
    return currentKind;
  }

  async function loadTiles() {
    currentLayers.forEach(l => map.removeLayer(l));
    currentLayers = [];
    const kind = resolveKind();
    const resp = await fetch(`/api/map/tiles/${currentZ}?kind=${kind}`);
    const data = await resp.json();
    if (data.tiles.length === 0) {
      console.warn('Sem tiles pro piso', currentZ, 'camada', kind);
      return;
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const t of data.tiles) {
      const url = `/map_tile/${kind}/${t.name}`;
      const bounds = [latLng(t.x, t.y), latLng(t.x + t.w, t.y + t.h)];
      const ov = L.imageOverlay(url, bounds, {className: 'tile-pixel'}).addTo(map);
      currentLayers.push(ov);
      minX = Math.min(minX, t.x);
      minY = Math.min(minY, t.y);
      maxX = Math.max(maxX, t.x + t.w);
      maxY = Math.max(maxY, t.y + t.h);
    }
    if (fitOnNextLoad) {
      map.fitBounds([latLng(minX, minY), latLng(maxX, maxY)]);
      map.setMaxBounds([latLng(minX - 500, minY - 500), latLng(maxX + 500, maxY + 500)]);
      fitOnNextLoad = false;
    }
  }

  // Quando o user zoom-in, se currentKind=auto, recarrega tiles com kind maior-res
  let lastResolvedKind = null;
  map.on('zoomend', () => {
    const newKind = resolveKind();
    if (newKind !== lastResolvedKind) {
      lastResolvedKind = newKind;
      loadTiles();
    }
  });

  async function loadNPCs() {
    npcMarkers.forEach(m => map.removeLayer(m));
    npcMarkers = [];
    if (!document.getElementById('show-npcs').checked) {
      document.getElementById('npc-count').textContent = '0 NPCs';
      return;
    }
    const resp = await fetch(`/api/map/npcs?z=${currentZ}`);
    const npcs = await resp.json();
    for (const n of npcs) {
      const m = L.circleMarker(latLng(n.x, n.y), {
        radius: 4, color: '#de360f', weight: 1, fillColor: '#fff', fillOpacity: 0.9,
      });
      m.bindTooltip(`<b>${n.npc_name}</b><br>${n.area_name || '?'} (${n.x},${n.y},${n.z})`, {sticky: true});
      m.on('click', () => { window.location.href = '/npcs/' + encodeURIComponent(n.npc_name); });
      m.addTo(map);
      npcMarkers.push(m);
    }
    document.getElementById('npc-count').textContent = npcs.length + ' NPCs';
  }

  document.getElementById('floor-select').addEventListener('change', e => {
    currentZ = parseInt(e.target.value);
    fitOnNextLoad = true;
    loadTiles(); loadNPCs();
  });
  document.getElementById('layer-select').addEventListener('change', e => {
    currentKind = e.target.value;
    fitOnNextLoad = true;
    loadTiles();
  });
  document.getElementById('show-npcs').addEventListener('change', loadNPCs);

  loadTiles(); loadNPCs();
})();
</script>

<style>
.map-toolbar { display: flex; gap: 16px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
.map-toolbar label { font-size: 13px; }
.map-toolbar select { padding: 3px 6px; }
.leaflet-container { font-family: inherit; background: #000; }
/* Tibia tiles sao pixel-art — usa nearest-neighbor ao dar zoom */
.tile-pixel, .leaflet-image-layer.tile-pixel {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  image-rendering: -webkit-optimize-contrast;
}
</style>
{% endblock %}
